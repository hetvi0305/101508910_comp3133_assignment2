<div class="container mt-4">
    <h2>Add Employee</h2>

    <form [formGroup]="form" (ngSubmit)="add()">

    <!-- 🔥 PHOTO UPLOAD -->
    <label class="form-label mt-2">Upload Photo</label>
    <input type="file" class="form-control mb-3" (change)="onFileSelect($event)">
    <input class="form-control mb-2" formControlName="first_name" placeholder="First Name">
    <input class="form-control mb-2" formControlName="last_name" placeholder="Last Name">
    <input class="form-control mb-2" formControlName="email" placeholder="Email">

    <select class="form-control mb-2" formControlName="gender">
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
    </select>

    <input class="form-control mb-2" formControlName="designation" placeholder="Designation">
    <input class="form-control mb-2" type="number" formControlName="salary" placeholder="Salary">
    <input class="form-control mb-2" type="date" formControlName="date_of_joining">
    <input class="form-control mb-2" formControlName="department" placeholder="Department">

    <!-- 🔥 FILE INPUT -->
    <input type="file" class="form-control mb-3" (change)="onFileSelect($event)">

    <button class="btn btn-success w-100">Add Employee</button>
    </form>
</div>
